name: CI — ScenIQ

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ── Typecheck ────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ── Tests unitaires ──────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  # ── Tests contrats + API ─────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Skip proprement si les secrets Supabase ne sont pas configurés
    if: ${{ secrets.TEST_SUPABASE_URL != '' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:contracts
      - run: npm run test:api
      - run: npm run test:snapshots
      - run: npm run test:cross-module
      - run: npm run test:perf
      - run: npm run test:security

  # ── E2E Playwright ───────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit, integration]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.TEST_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.TEST_CLERK_SECRET_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Seed test DB
        run: npm run seed:test
      - name: Start app + run E2E
        run: |
          npm run start &
          sleep 5
          npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ── Gate final ───────────────────────────────────────────────────────────
  all-green:
    name: ✅ All green
    runs-on: ubuntu-latest
    needs: [typecheck, unit, integration, e2e]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          TYPECHECK="${{ needs.typecheck.result }}"
          UNIT="${{ needs.unit.result }}"
          INTEG="${{ needs.integration.result }}"
          E2E="${{ needs.e2e.result }}"
          # integration peut être "skipped" si secrets pas configurés (c'est OK)
          INTEG_OK=$([[ "$INTEG" == "success" || "$INTEG" == "skipped" ]] && echo "true" || echo "false")
          E2E_OK=$([[ "$E2E" == "success" || "$E2E" == "skipped" ]] && echo "true" || echo "false")
          if [[ "$TYPECHECK" != "success" || "$UNIT" != "success" || "$INTEG_OK" != "true" || "$E2E_OK" != "true" ]]; then
            echo "❌ typecheck=$TYPECHECK unit=$UNIT integration=$INTEG e2e=$E2E"
            exit 1
          fi
          echo "✅ Tous les tests passent — merge autorisé"
