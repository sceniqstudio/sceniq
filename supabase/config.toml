# supabase/config.toml
[api]
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
enabled = true
# Buckets définis ici uniquement pour référence — créer manuellement dans le dashboard Supabase
# brand-assets : privé, 10MB, images+vidéo
# clips : public, 500MB, video/mp4
# client-uploads : privé, 25MB, images+audio+vidéo (pour /commande)

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
